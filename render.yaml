services:
  - type: web
    name: ulinkup-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: >
      python manage.py migrate --no-input &&
      python manage.py collectstatic --no-input --clear &&
      python manage.py create_admin &&
      daphne -b 0.0.0.0 -p $PORT ulinkup.asgi:application
    healthCheckPath: /api/config/
    envVars:
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "ulinkup-backend.onrender.com,ulinkup-backend-p6qh.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://ulinkup.vercel.app"
      - key: DATABASE_URL
        fromDatabase:
          name: ulinkup-db
          property: connectionString
      - key: SECURE_SSL_REDIRECT
        value: "False"
      # IMPORTANT: Set these in Render Dashboard manually:
      # GOOGLE_CLIENT_ID = 127360792031-s8ofa6v4le03e7iqthqhg13ds5qaolq4.apps.googleusercontent.com
      # GOOGLE_CLIENT_SECRET = (set in Render dashboard → Environment)

databases:
  - name: ulinkup-db
    plan: free
    region: oregon
