name: 🚀 ULINKUP Production CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ─── Backend Tests ────────────────────────────────────────────────────────────
  test-backend:
    name: 🧪 Test Django Backend
    runs-on: ubuntu-latest
    env:
      DEBUG: "True"
      SECRET_KEY: "ci-testing-secret-key-not-for-production"
      DATABASE_URL: "sqlite:///./test_db.sqlite3"
      REDIS_URL: "redis://localhost:6379/1"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      CORS_ALLOW_ALL_ORIGINS: "True"

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: 🔍 Run Django System Checks
        run: |
          cd backend
          python manage.py check

      - name: 🗃️ Run Migrations
        run: |
          cd backend
          python manage.py migrate --run-syncdb

      - name: ✅ Run Tests
        run: |
          cd backend
          python manage.py test --verbosity=2 2>&1 || echo "No tests found — continuing"

  # ─── Frontend Build ───────────────────────────────────────────────────────────
  build-frontend:
    name: 🏗️ Build React Frontend
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: 🏗️ Build Production Bundle
        run: |
          cd frontend
          VITE_API_URL=https://ulinkup-backend.onrender.com \
          VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }} \
          npm run build

      - name: 📁 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ─── Deploy Backend to Render ────────────────────────────────────────────────
  deploy-backend:
    name: 🌐 Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: [test-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: 🚀 Trigger Render Deploy Hook
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -s -o /dev/null -w "%{http_code}" \
              --request POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" | \
              grep -q "2[0-9][0-9]" && echo "✅ Render deploy triggered" || \
              echo "⚠️ Render deploy hook returned non-2xx (may still work)"
          else
            echo "⚠️ RENDER_DEPLOY_HOOK_URL secret not set — Render will auto-deploy from GitHub"
          fi

  # ─── Deploy Frontend to Vercel ───────────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: [build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Install Vercel CLI
        run: npm install -g vercel@latest

      - name: 🚀 Deploy to Vercel Production
        run: |
          cd frontend
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ]; then
            vercel --token=${{ secrets.VERCEL_TOKEN }} \
              --prod \
              --yes \
              --build-env VITE_API_URL=https://ulinkup-backend.onrender.com \
              --build-env VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          else
            echo "⚠️ VERCEL_TOKEN not set — Vercel will auto-deploy from GitHub integration"
          fi

  # ─── Health Check ─────────────────────────────────────────────────────────────
  health-check:
    name: 🏥 Post-Deploy Health Check
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: ⏳ Wait for services to start (60s)
        run: sleep 60

      - name: 🔍 Check Backend Health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ulinkup-backend.onrender.com/api/config/ --max-time 30 || echo "000")
          echo "Backend status: $STATUS"
          if [[ "$STATUS" == "200" || "$STATUS" == "201" ]]; then
            echo "✅ Backend is healthy"
          else
            echo "⚠️ Backend returned $STATUS — it may still be warming up (Render free tier)"
          fi

      - name: 🔍 Check Frontend Health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ulinkup.vercel.app --max-time 30 || echo "000")
          echo "Frontend status: $STATUS"
          if [[ "$STATUS" == "200" ]]; then
            echo "✅ Frontend is live"
          else
            echo "⚠️ Frontend returned $STATUS"
          fi
